name: astro-onboarder

services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: astro_onboarder
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d astro_onboarder"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
